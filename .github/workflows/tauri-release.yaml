name: "publish"
on:
  push:
    branches:
      - "tauri/updater"

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, windows-latest, macos-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Get the short commit hash to use as a version tag
      - name: Set short git commit SHA
        id: vars
        shell: bash
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # Install Bun - This is your runtime and package manager
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      # Only needed for Linux
      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install app dependencies
        run: bun install --frozen-lockfile

      # Generate changelog
      - name: Generate Changelog
        run: bun run changelog

      - name: Build and release the Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

        with:
          tagName: build-${{ steps.vars.outputs.sha_short }}
          releaseName: "App Build ${{ steps.vars.outputs.sha_short }}"
          releaseBody: "Automated build from commit ${{ github.sha }}"
          releaseDraft: false
          prerelease: true
          bundleIdentifier: com.horijin.dev
