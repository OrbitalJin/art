name: "publish"
on:
  push:
    branches:
      - "chat"

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, windows-latest, macos-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # 1. Install Bun
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: swatinem/rust-cache@v2
        with:
          target-dir: target
          key: ${{ runner.os }}-${{ matrix.platform }}-cargo

      # 2. Setup Node (Still needed by some Tauri internals/tooling)
      - uses: actions/setup-node@v4
        with:
          node-version: lts
          cache: "bun" # Setup-node supports bun caching!

      # 3. Install dependencies with Bun
      - name: Install app dependencies
        run: bun install

      # 4. (Optional) If you have a build script in package.json, 
      # tauri-action will use it, but ensure your tauri.conf.json 
      # "beforeBuildCommand" uses "bun run build" instead of npm/yarn.

      - name: Build and release the Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          bundleIdentifier: com.horijin.dev
