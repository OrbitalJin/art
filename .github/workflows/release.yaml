name: publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, windows-latest, macos-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get release version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install app dependencies
        run: bun install --frozen-lockfile

      - name: Generate changelog
        run: bun run generate:changelog

      - name: Verify Tauri version matches tag
        shell: bash
        run: |
          CONFIG_VERSION=$(bun -e "console.log(JSON.parse(require('fs').readFileSync('src-tauri/tauri.conf.json', 'utf8')).version)")
          if [ "$CONFIG_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "Tag version (${{ steps.version.outputs.version }}) does not match tauri.conf.json version ($CONFIG_VERSION)"
            exit 1
          fi

      - name: Verify changelog is up to date
        shell: bash
        run: |
          git diff --exit-code public/changelog.json

      - name: Build and release the Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.version.outputs.tag }}
          releaseName: "Art v${{ steps.version.outputs.version }}"
          releaseBody: "Release v${{ steps.version.outputs.version }}"
          releaseDraft: false
          prerelease: false

  publish-latest-json-pages:
    needs: publish-tauri
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Download latest.json from latest release
        run: |
          mkdir -p dist
          curl -L \
            https://github.com/orbitaljin/art/releases/latest/download/latest.json \
            -o dist/latest.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
